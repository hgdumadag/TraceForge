<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TraceForge — Audit Workflow Builder</title>
    <script>
      // Set the theme before first paint to avoid a dark flash for light-theme users.
      // Mirrors the logic in src/theme.ts, which owns theme state after load.
      (function () {
        var t = localStorage.getItem("tf-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
